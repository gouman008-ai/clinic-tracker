<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Patient Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e0e0e0;font-family:'Courier New',monospace;
         display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
    header{text-align:center;padding:16px 0 12px}
    header h1{font-size:1.3rem;color:#4ade80;letter-spacing:1px}
    header p{font-size:.78rem;color:#6b7280;margin-top:4px}
    #tw{width:100%;max-width:820px;border:1px solid #2d2d3a;border-radius:10px;
        overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6)}
    .ttb{background:#1e1e2e;padding:8px 14px;display:flex;align-items:center;
         gap:8px;border-bottom:1px solid #2d2d3a}
    .dot{width:12px;height:12px;border-radius:50%}
    .dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28ca41}
    .ttitle{margin-left:8px;font-size:.78rem;color:#6b7280}
    #output{background:#0d0d14;color:#a8e6a3;padding:16px;height:460px;
            overflow-y:auto;white-space:pre-wrap;word-break:break-word;
            font-size:.88rem;line-height:1.6}
    #ir{display:flex;background:#111118;border-top:1px solid #2d2d3a;
        align-items:center;padding:10px 14px;gap:8px}
    .ps{color:#4ade80;font-size:1rem;user-select:none}
    #ui{flex:1;background:transparent;border:none;outline:none;color:#fff;
        font-family:'Courier New',monospace;font-size:.88rem;caret-color:#4ade80}
    #sb{background:#4ade80;color:#0f1117;border:none;padding:5px 14px;
        border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer}
    #sb:hover{background:#22c55e}
    #sb:disabled{background:#2d2d3a;color:#6b7280;cursor:default}
    #stbar{width:100%;max-width:820px;margin-top:8px;font-size:.72rem;
           color:#4b5563;text-align:right;padding-right:4px}
    #stbar span{color:#4ade80}
  </style>
</head>
<body>
<header>
  <h1>🏥 Hospital Patient Registration &amp; Follow-up Tracker</h1>
  <p>Compiled C → WebAssembly &nbsp;|&nbsp; Type input below and press Enter</p>
</header>
<div id="tw">
  <div class="ttb">
    <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
    <span class="ttitle">hospital_tracker — wasm</span>
  </div>
  <div id="output"></div>
  <div id="ir">
    <span class="ps">❯</span>
    <input id="ui" type="text" placeholder="Wait for program to load…" autocomplete="off" disabled/>
    <button id="sb" disabled>Send</button>
  </div>
</div>
<div id="stbar">Status: <span id="st">Initialising…</span></div>

<script>
  var out = document.getElementById('output');
  var inp = document.getElementById('ui');
  var btn = document.getElementById('sb');
  var st  = document.getElementById('st');

  function write(t){ out.textContent += t; out.scrollTop = out.scrollHeight; }

  /* ── Char queue + waker ───────────────────────── */
  var Q = [];       // pending char codes
  var wake = null;  // Asyncify resolve

  function push(line) {
    var s = line + '\n';
    for(var i=0;i<s.length;i++) Q.push(s.charCodeAt(i));
    drain();
  }

  function drain() {
    if(wake && Q.length){ var f=wake; wake=null; f(Q.shift()); }
  }

  function readByte() {
    if(Q.length) return Q.shift();
    return Asyncify.handleSleep(function(resolve){ wake=resolve; });
  }

  /* ── UI ──────────────────────────────────────── */
  function send(){
    var v = inp.value; inp.value='';
    write('> '+v+'\n');
    push(v);
  }
  btn.addEventListener('click', send);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') send(); });

  /* ── Emscripten Module ───────────────────────── */
  var Module = {
    print:    function(t){ write(t+'\n'); },
    printErr: function(t){
      /* suppress the fd_read asyncify noise from stderr display */
      if(t.indexOf('ASYNCIFY_IMPORTS')!==-1) return;
      write('[!] '+t+'\n');
    },

    canvas: (function(){
      var c=document.createElement('canvas');
      c.style.display='none';
      document.body.appendChild(c);
      return c;
    })(),

    /* Override fd_read BEFORE wasm instantiation */
    instantiateWasm: function(info, receive) {
      /* Patch fd_read in the import object so Asyncify sees it */
      if(info['wasi_snapshot_preview1']) {
        info['wasi_snapshot_preview1']['fd_read'] = function(fd, iov, iovcnt, pnum) {
          /* Only intercept stdin (fd=0) */
          if(fd !== 0) {
            /* fall through to default implementation for other fds */
            return 8; /* EBADF - will be handled gracefully */
          }
          return Asyncify.handleSleep(function(resolve) {
            var byte = readByte();
            if(byte && byte.then) {
              /* readByte itself returned a promise (already in handleSleep) */
              /* This path shouldn't happen, but guard it */
              resolve(0);
            } else {
              /* Write byte into the iov buffer */
              try {
                var view = new DataView(Module.wasmMemory.buffer);
                var ptr  = view.getUint32(iov,     true);
                var len  = view.getUint32(iov + 4, true);
                if(len > 0 && typeof byte === 'number') {
                  view.setUint8(ptr, byte);
                  view.setUint32(pnum, 1, true);
                } else {
                  view.setUint32(pnum, 0, true);
                }
              } catch(e) {}
              resolve(0);
            }
          });
        };
      }

      /* Now do normal instantiation */
      WebAssembly.instantiateStreaming(fetch('index.wasm'), info)
        .catch(function(){
          return fetch('index.wasm')
            .then(function(r){ return r.arrayBuffer(); })
            .then(function(buf){ return WebAssembly.instantiate(buf, info); });
        })
        .then(function(result){
          receive(result.instance);
        });
      return {};
    },

    onRuntimeInitialized: function(){
      write('Program loaded. Starting…\n\n');
      st.textContent = 'Running';
      inp.disabled = false;
      inp.placeholder = 'Type your input here…';
      btn.disabled = false;
      inp.focus();
    },

    setStatus: function(t){ if(t) st.textContent=t; },
    totalDependencies: 0,
    monitorRunDependencies: function(n){
      st.textContent = n ? 'Loading… ('+n+' left)' : 'Running';
    }
  };

  window.addEventListener('error',function(e){
    write('\n[!] Error: '+e.message+'\n');
  });
</script>

<script async type="text/javascript" src="index.js"></script>

</body>
</html>
