<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Patient Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 16px 0 12px;
    }
    header h1 {
      font-size: 1.3rem;
      color: #4ade80;
      letter-spacing: 1px;
    }
    header p {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 4px;
    }

    #terminal-wrapper {
      width: 100%;
      max-width: 820px;
      border: 1px solid #2d2d3a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .term-titlebar {
      background: #1e1e2e;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2d2d3a;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red   { background: #ff5f57; }
    .dot-yellow{ background: #ffbd2e; }
    .dot-green { background: #28ca41; }
    .term-title {
      margin-left: 8px;
      font-size: 0.78rem;
      color: #6b7280;
    }

    #output {
      background: #0d0d14;
      color: #a8e6a3;
      padding: 16px;
      height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    #input-row {
      display: flex;
      background: #111118;
      border-top: 1px solid #2d2d3a;
      align-items: center;
      padding: 10px 14px;
      gap: 8px;
    }
    .prompt-symbol {
      color: #4ade80;
      font-size: 1rem;
      user-select: none;
    }
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffffff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.88rem;
      caret-color: #4ade80;
    }
    #sendBtn {
      background: #4ade80;
      color: #0f1117;
      border: none;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #sendBtn:hover { background: #22c55e; }
    #sendBtn:disabled { background: #2d2d3a; color: #6b7280; cursor: default; }

    #status-bar {
      width: 100%;
      max-width: 820px;
      margin-top: 8px;
      font-size: 0.72rem;
      color: #4b5563;
      text-align: right;
      padding-right: 4px;
    }
    #status-bar span { color: #4ade80; }
  </style>
</head>
<body>

<header>
  <h1>🏥 Hospital Patient Registration &amp; Follow-up Tracker</h1>
  <p>Compiled C → WebAssembly &nbsp;|&nbsp; Type input below and press Enter</p>
</header>

<div id="terminal-wrapper">
  <div class="term-titlebar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <span class="term-title">hospital_tracker — wasm</span>
  </div>
  <div id="output">Loading program…\n</div>
  <div id="input-row">
    <span class="prompt-symbol">❯</span>
    <input id="userInput" type="text" placeholder="Type your input here…" autocomplete="off" />
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>
<div id="status-bar">Status: <span id="statusText">Initialising…</span></div>

<script>
  /* ── Terminal output helpers ─────────────────────────── */
  var outputEl   = document.getElementById('output');
  var inputEl    = document.getElementById('userInput');
  var sendBtn    = document.getElementById('sendBtn');
  var statusText = document.getElementById('statusText');

  function termWrite(text) {
    outputEl.textContent += text;
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  /* ── Async stdin queue ───────────────────────────────── */
  var charQueue  = [];   // buffered chars waiting to be consumed
  var stdinWake  = null; // Asyncify wakeUp callback

  function enqueueLine(line) {
    var full = line + '\n';
    for (var i = 0; i < full.length; i++) {
      charQueue.push(full.charCodeAt(i));
    }
    if (stdinWake) {
      var fn = stdinWake;
      stdinWake = null;
      fn(charQueue.shift());   // resume WASM with next char
    }
  }

  /* ── Send button / Enter key ─────────────────────────── */
  function sendInput() {
    var val = inputEl.value;
    inputEl.value = '';
    termWrite('> ' + val + '\n');
    enqueueLine(val);
  }

  sendBtn.addEventListener('click', sendInput);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendInput();
  });

  /* ── Emscripten Module configuration ─────────────────── */
  var Module = {
    /* Intercept stdout / stderr */
    print: function(text) {
      termWrite(text + '\n');
    },
    printErr: function(text) {
      termWrite('[ERR] ' + text + '\n');
    },

    /* No canvas needed */
    canvas: null,

    /* Status hook */
    setStatus: function(text) {
      if (text) {
        statusText.textContent = text;
      } else {
        statusText.textContent = 'Running';
        sendBtn.disabled = false;
        inputEl.focus();
      }
    },

    /* Wire async stdin BEFORE the program starts */
    preRun: [function() {
      FS.init(function getChar() {
        if (charQueue.length > 0) {
          return charQueue.shift();
        }
        /* No char available → suspend via ASYNCIFY until user sends input */
        return Asyncify.handleSleep(function(resolve) {
          stdinWake = resolve;          // will be called by enqueueLine()
        });
      });
    }],

    onRuntimeInitialized: function() {
      outputEl.textContent = '';       // clear "Loading…"
    },

    /* Suppress default Emscripten progress overlay */
    totalDependencies: 0,
    monitorRunDependencies: function(left) {}
  };

  window.onerror = function(msg) {
    termWrite('\n[!] Runtime error: ' + msg + '\n');
  };
</script>

<script async type="text/javascript" src="index.js"></script>

</body>
</html>
