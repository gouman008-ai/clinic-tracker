<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Hospital Patient Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e0e0e0;font-family:'Courier New',monospace;
         display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
    header{text-align:center;padding:16px 0 12px}
    header h1{font-size:1.3rem;color:#4ade80;letter-spacing:1px}
    header p{font-size:.78rem;color:#6b7280;margin-top:4px}
    #tw{width:100%;max-width:820px;border:1px solid #2d2d3a;border-radius:10px;
        overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6)}
    .ttb{background:#1e1e2e;padding:8px 14px;display:flex;align-items:center;
         gap:8px;border-bottom:1px solid #2d2d3a}
    .dot{width:12px;height:12px;border-radius:50%}
    .dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28ca41}
    .ttitle{margin-left:8px;font-size:.78rem;color:#6b7280}
    #output{background:#0d0d14;color:#a8e6a3;padding:16px;height:460px;
            overflow-y:auto;white-space:pre-wrap;word-break:break-word;
            font-size:.88rem;line-height:1.6}
    #ir{display:flex;background:#111118;border-top:1px solid #2d2d3a;
        align-items:center;padding:10px 14px;gap:8px}
    .ps{color:#4ade80;font-size:1rem;user-select:none}
    #ui{flex:1;background:transparent;border:none;outline:none;color:#fff;
        font-family:'Courier New',monospace;font-size:.88rem;caret-color:#4ade80}
    #sb{background:#4ade80;color:#0f1117;border:none;padding:5px 14px;
        border-radius:6px;font-size:.82rem;font-weight:700;cursor:pointer}
    #sb:hover{background:#22c55e}
    #sb:disabled{background:#2d2d3a;color:#6b7280;cursor:default}
    #stbar{width:100%;max-width:820px;margin-top:8px;font-size:.72rem;
           color:#4b5563;text-align:right;padding-right:4px}
    #stbar span{color:#4ade80}
  </style>
</head>
<body>
<header>
  <h1>🏥 Hospital Patient Registration &amp; Follow-up Tracker</h1>
  <p>Compiled C → WebAssembly &nbsp;|&nbsp; Type input below and press Enter</p>
</header>
<div id="tw">
  <div class="ttb">
    <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
    <span class="ttitle">hospital_tracker — wasm</span>
  </div>
  <div id="output"></div>
  <div id="ir">
    <span class="ps">❯</span>
    <input id="ui" type="text" placeholder="Wait for program to load…" autocomplete="off" disabled/>
    <button id="sb" disabled>Send</button>
  </div>
</div>
<div id="stbar">Status: <span id="st">Initialising…</span></div>

<script>
  var outputEl = document.getElementById('output');
  var inputEl  = document.getElementById('ui');
  var btnEl    = document.getElementById('sb');
  var stEl     = document.getElementById('st');

  /* ── output ─────────────────────────────────── */
  function write(t) {
    outputEl.textContent += t;
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  /* ── char queue + asyncify waker ────────────── */
  var charQ = [];
  var waker = null;

  function pushLine(line) {
    var s = line + '\n';
    for (var i = 0; i < s.length; i++) charQ.push(s.charCodeAt(i));
    if (waker && charQ.length) {
      var fn = waker; waker = null;
      fn(charQ.shift());
    }
  }

  /* ── UI ──────────────────────────────────────── */
  function send() {
    var v = inputEl.value; inputEl.value = '';
    write('> ' + v + '\n');
    pushLine(v);
  }
  btnEl.addEventListener('click', send);
  inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });

  /* ── Module ──────────────────────────────────── */
  var Module = {
    print: function(t) { write(t + '\n'); },
    printErr: function(t) {
      if (t.indexOf('ASYNCIFY') !== -1) return; // suppress asyncify noise
      write('[!] ' + t + '\n');
    },

    preRun: [function() {
      FS.init(function() {
        /* getchar() callback — called once per character */
        if (charQ.length > 0) return charQ.shift();
        /* suspend until user types */
        return Asyncify.handleSleep(function(resolve) {
          waker = resolve;
        });
      });
    }],

    onRuntimeInitialized: function() {
      write('Program loaded. Starting…\n\n');
      stEl.textContent = 'Running';
      inputEl.disabled = false;
      inputEl.placeholder = 'Type your input here…';
      btnEl.disabled = false;
      inputEl.focus();
    },

    setStatus: function(t) { if (t) stEl.textContent = t; },
    totalDependencies: 0,
    monitorRunDependencies: function(n) {
      stEl.textContent = n ? 'Loading (' + n + ' left)…' : 'Running';
    }
  };

  window.addEventListener('error', function(e) {
    write('\n[!] Error: ' + e.message + '\n');
  });
</script>

<script async type="text/javascript" src="index.js"></script>

</body>
</html>
